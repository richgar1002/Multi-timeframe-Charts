<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Multi-Timeframe Charts Dashboard</title>
    <!-- Google Fonts for premium modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <!-- Browser Error Reporting Hook -->
    <script>
        window.__clientLogLimiter = new Map();
        window.__reportClientLog = function(level, message) {
            try {
                const key = `${level}:${String(message).slice(0, 240)}`;
                const now = Date.now();
                const last = window.__clientLogLimiter.get(key) || 0;
                if (now - last < 10000) {
                    return;
                }
                window.__clientLogLimiter.set(key, now);
                if (window.__clientLogLimiter.size > 200) {
                    const cutoff = now - 60000;
                    for (const [entryKey, ts] of window.__clientLogLimiter.entries()) {
                        if (ts < cutoff) {
                            window.__clientLogLimiter.delete(entryKey);
                        }
                    }
                }
                fetch('/api/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level, message })
                }).catch(() => {});
            } catch (_) {}
        };

        window.addEventListener('error', function(e) {
            let msg = e.message;
            if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
                msg = "Failed to load asset: " + (e.target.src || e.target.href);
            }
            window.__reportClientLog('error', msg);
        }, true);

        window.addEventListener('unhandledrejection', function(e) {
            window.__reportClientLog('error', "Unhandled promise rejection: " + e.reason);
        });
    </script>
    <!-- TradingView Lightweight Charts -->
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Top Header & Dashboard Controls -->
    <header class="dashboard-header">
        <div class="header-logo">
            <span class="logo-icon">▲</span>
            <h1>ANTIGRAVITY <span class="logo-accent">ORDER FLOW</span></h1>
        </div>
        
        <div class="header-controls">
            <div class="control-group">
                <label for="grid-count-select">GRID LAYOUT</label>
                <div class="select-wrapper">
                    <select id="grid-count-select">
                        <option value="1">1 Chart (Full)</option>
                        <option value="2">2 Charts (Side-by-Side)</option>
                        <option value="3">3 Charts (Columns)</option>
                        <option value="3M">3 Charts (Main + Stack)</option>
                        <option value="6">6 Charts (3x2 Grid)</option>
                        <option value="9">9 Charts (3x3 Grid)</option>
                        <option value="12">12 Charts (3x4 Grid)</option>
                        <option value="24">24 Charts (3x8 Grid)</option>
                    </select>
                </div>
            </div>

            <div class="data-note">
                Crypto order flow is live. Stock flow metrics are estimated from delayed price snapshots.
            </div>
            
            <div class="system-status">
                <span class="status-dot green"></span>
                <span class="status-text">Backend Connected</span>
            </div>
        </div>
    </header>

    <!-- Main Chart Grid Container -->
    <main id="chart-grid" class="grid-3">
        <!-- Chart panes will be dynamically generated by JS -->
    </main>

    <script src="/static/js/footprint.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
